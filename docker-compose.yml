services:

  postgres:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis-cache

    ports:
      - "6379:6379"

  app:
    build: .
    container_name: todo-app

    ports:
      - "8082:8082"

    depends_on:
      - postgres
      - redis